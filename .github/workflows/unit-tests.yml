name: Unit Tests

on:
  push:
    branches: [main, dev]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests (jdk${{ matrix.java-version }}) [${{ github.ref_name }}]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: ["25"]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Run unit tests
        run: mvn -B test
