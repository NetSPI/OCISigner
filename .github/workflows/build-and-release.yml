name: Build Release Artifacts

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v0.5.0)"
        required: true
        type: string
      publish_jdk_21:
        description: "Publish JDK 21 artifact"
        required: true
        default: true
        type: boolean
      publish_jdk_22:
        description: "Publish JDK 22 artifact"
        required: true
        default: false
        type: boolean
      publish_jdk_23:
        description: "Publish JDK 23 artifact"
        required: true
        default: false
        type: boolean
      publish_jdk_24:
        description: "Publish JDK 24 artifact"
        required: true
        default: false
        type: boolean
      publish_jdk_25:
        description: "Publish JDK 25 artifact"
        required: true
        default: false
        type: boolean
      prerelease:
        description: "Mark GitHub release as prerelease"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      release_notes:
        description: "Optional markdown notes (e.g., '- Added ...')"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  validate:
    if: github.event_name == 'workflow_dispatch' && github.repository == 'NetSPI/OCISigner' && github.actor == 'WebbinRoot'
    runs-on: ubuntu-latest
    steps:
      - name: Validate target selection
        run: |
          if [[ "${{ inputs.publish_jdk_21 }}" != "true" && \
                "${{ inputs.publish_jdk_22 }}" != "true" && \
                "${{ inputs.publish_jdk_23 }}" != "true" && \
                "${{ inputs.publish_jdk_24 }}" != "true" && \
                "${{ inputs.publish_jdk_25 }}" != "true" ]]; then
            echo "::error::Select at least one JDK target (21, 22, 23, 24, and/or 25)."
            exit 1
          fi

  build:
    if: github.event_name == 'workflow_dispatch' && github.repository == 'NetSPI/OCISigner' && github.actor == 'WebbinRoot'
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: ["21", "22", "23", "24", "25"]
    env:
      TARGET_SELECTED: ${{ (matrix.java-version == '21' && inputs.publish_jdk_21) || (matrix.java-version == '22' && inputs.publish_jdk_22) || (matrix.java-version == '23' && inputs.publish_jdk_23) || (matrix.java-version == '24' && inputs.publish_jdk_24) || (matrix.java-version == '25' && inputs.publish_jdk_25) }}
    steps:
      # v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        if: env.TARGET_SELECTED == 'true'
        with:
          fetch-depth: 1

      - name: Set up JDK ${{ matrix.java-version }}
        if: env.TARGET_SELECTED == 'true'
        # v5.2.0
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Build (target Java ${{ matrix.java-version }})
        if: env.TARGET_SELECTED == 'true'
        run: mvn -B -Dmaven.test.skip=true -Dmaven.compiler.release=${{ matrix.java-version }} clean package

      - name: Locate and label shaded jar
        if: env.TARGET_SELECTED == 'true'
        id: artifact
        run: |
          jar=$(ls target/*-all.jar | head -n 1)
          labeled="${jar%.jar}-jdk${{ matrix.java-version }}.jar"
          cp "$jar" "$labeled"
          echo "jar=$labeled" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        if: env.TARGET_SELECTED == 'true'
        # v7.0.0
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: OCISigner-jar-jdk${{ matrix.java-version }}
          path: ${{ steps.artifact.outputs.jar }}

  release:
    if: github.event_name == 'workflow_dispatch' && github.repository == 'NetSPI/OCISigner' && github.actor == 'WebbinRoot'
    runs-on: ubuntu-latest
    needs: [validate, build]
    steps:
      # v8.0.1
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: dist

      - name: Create GitHub release
        # v2.6.1
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          append_body: true
          body: ${{ inputs.release_notes }}
          files: dist/**/*
